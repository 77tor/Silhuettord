<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Silhuett-ord</title>
    <link rel="icon" type="image/png" href="silhuett-ord_02.png">
    <link rel="apple-touch-icon" href="silhuett-ord_02.png">
    <style>
        @font-face {
            font-family: 'Trykkskrift-1';
            src: url('Trykkskrift-1.otf') format('opentype'),
                 url('Trykkskrift-1.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --unit-size: 42px; 
            --stue-height: 42px;
            --total-height: 70px;
            --diff: calc(var(--total-height) - var(--stue-height));
            --primary: #2c3e50;
        }

        body.mode-bilder {
            --unit-size: 45px;
            --stue-height: 45px;
            --total-height: 75px;
        }

        body { font-family: sans-serif; display: flex; margin: 0; background: #f0f2f5; }

        #mode-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white;
        }
        .mode-card {
            background: white; color: #333; padding: 40px; border-radius: 12px;
            text-align: center; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .mode-btn {
            background: #3498db; color: white; border: none; padding: 15px 25px;
            margin: 10px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold;
        }

        #sidebar {
            width: 350px; padding: 25px; background: var(--primary); color: white;
            height: 100vh; overflow-y: auto; position: fixed; box-sizing: border-box;
            z-index: 100; display: flex; flex-direction: column; text-align: center;
        }

/* STIL FOR LOGO */
        .sidebar-logo {
            width: 120px; /* Juster denne verdien for å endre størrelsen */
            height: auto;
            margin: 0 auto 20px auto;
            display: block;
        }
        .sidebar-content { flex: 1; text-align: left; }
        #sidebar h2 { font-size: 1.2rem; border-bottom: 2px solid #34495e; padding-bottom: 10px; margin-top: 0; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #bdc3c7; }

        select, input, textarea, button { width: 100%; padding: 10px; border-radius: 4px; border: none; margin-bottom: 10px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; background: #3498db; color: white; }
        
        .btn-generate { background: #3498db; margin-top: 10px; }
        .btn-print { background: #27ae60; }
        .btn-reload { background: #8e44ad; }

        .checkbox-group {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-group:hover { background: rgba(255,255,255,0.15); }
        .checkbox-group input { width: 18px; height: 18px; margin: 0; cursor: pointer; }
        .checkbox-group label { margin: 0; color: white; font-size: 0.95rem; cursor: pointer; display: inline; }

        #preview { margin-left: 350px; padding: 20px; width: calc(100% - 350px); display: flex; flex-direction: column; align-items: center; }
        .paper {
            background: white; width: 210mm; min-height: 290mm; padding: 15mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); margin-bottom: 30px; box-sizing: border-box;
        }

        .paper-header { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .info-box { width: 320px; background: #fff; border: 1px solid #ccc; padding: 8px; font-size: 0.8rem; border-radius: 4px; line-height: 1.3; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 40px; 
            width: 100%;
        }

        .mode-bilder .grid-container { gap: 60px 40px; }
        .mode-bilder .word-unit { min-height: 140px; }
        .mode-bilder .image-box { height: 85px; margin-bottom: 15px; }
        .mode-bilder .image-box img { width: 80px; height: 80px; }
        .mode-bilder .shapes-wrapper { margin-bottom: 35px; }
        .mode-bilder .box { font-size: 38px; }

        .word-unit { display: flex; flex-direction: column; min-height: 110px; page-break-inside: avoid; align-items: center; justify-content: flex-end; }
        .image-box { display: flex; align-items: center; }
        .shapes-wrapper { height: var(--total-height); display: flex; align-items: flex-end; position: relative; margin-bottom: 20px; }
        .shapes { display: flex; align-items: flex-end; }
        .box { width: var(--unit-size); border: 2px solid #000; margin-left: -2px; background: #fff; box-sizing: border-box; display: flex; justify-content: center; position: relative; font-family: 'Trykkskrift-1', sans-serif; font-size: 32px; line-height: 1; }

        .stue { height: var(--stue-height); align-items: flex-end; }
        .stue-loft { height: var(--total-height); align-items: flex-end; }
        .stue-kjeller { height: var(--total-height); margin-bottom: calc(var(--diff) * -1); align-items: flex-start; }
        .box span { padding-bottom: 2px; text-align: center; width: 100%; }
        .stue-kjeller span { padding-top: 2px; padding-bottom: 0; }

        #word-bank-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; font-size: 1.3rem; font-weight: bold; margin: 30px auto; max-width: 85%; }
        .bank-word { border: 2px solid #333; padding: 8px 15px; border-radius: 6px; }

        .hidden { display: none !important; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; }
            #sidebar, #mode-overlay { display: none !important; }
            #preview { margin: 0 !important; width: 100% !important; padding: 0 !important; }
            .paper {
                box-shadow: none !important; margin: 0 !important; width: 210mm !important;
                height: 297mm !important; 
                padding: 5mm 15mm 10mm 15mm !important; 
                page-break-after: always;
            }
            .grid-container { gap: 25px 40px; }
            .mode-bilder .grid-container { gap: 80px 40px; }
            #bankPaper { display: block !important; }
            #bankPaper.hidden { display: none !important; }
            #fasitPaper { display: block !important; }
            #fasitPaper.hidden { display: none !important; }
        }
    </style>
</head>
<body class="mode-bilder">

<div id="mode-overlay">
    <div class="mode-card">
        <h2>Silhuett-ord</h2>
        <p class="mode-description">Velg om du vil generere oppgaver basert på bilder, eller skrive inn dine egne ord manuelt.</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="mode-btn" onclick="setMode('bilder')">Bilder</button>
            <button class="mode-btn" onclick="setMode('egne')">Egne ord</button>
        </div>
    </div>
</div>

<div id="sidebar">
<img src="silhuett-ord_03.png" alt="Silhuett-ord logo" class="sidebar-logo">
    <div class="sidebar-content">
        <h2 id="mode-title">Innstillinger</h2>

        <div id="settings-bilder">
            <div class="group">
                <label>Bokstavantall:</label>
                <select id="chars">
                    <option value="2,3,4,5">2 til 5 bokstaver</option>
                    <option value="3">3 bokstaver</option>
                    <option value="4">4 bokstaver</option>
                </select>
            </div>
            <div class="group"><label>Antall ord (maks 6):</label><input type="number" id="count" value="6" min="1" max="6"></div>
        </div>

        <div id="settings-egne" class="hidden">
            <div class="group">
                <label>Skriv ord (maks 12, komma-separert):</label>
                <textarea id="custom-words" placeholder="is, sol, ape..."></textarea>
            </div>
            <div class="group">
                <label>Plassering av ord:</label>
                <select id="word-placement" onchange="updateBankPlacementOnly()">
                    <option value="bank">I ordbank øverst</option>
                    <option value="page">I ordbank på egen side</option>
                    <option value="none">Ingen tekst</option>
                </select>
            </div>
        </div>

        <button class="btn-generate" onclick="run()">GENERER</button>
        
        <hr style="border: 0; border-top: 1px solid #34495e; margin: 15px 0;">

        <div class="checkbox-group" onclick="toggleFasitCheckbox()">
            <input type="checkbox" id="fasit-checkbox" onchange="updateFasitVisibility()">
            <label for="fasit-checkbox">Inkluder fasit</label>
        </div>
        
        <button class="btn-print" onclick="window.print()">SKRIV UT</button>
        <button class="btn-reload" onclick="location.reload()">BYTT MODUS</button>
    </div>
</div>

<div id="preview">
    <div class="paper hidden" id="bankPaper">
        <h1>Ordbank</h1>
        <p>Her er ordene du skal bruke i oppgavene:</p>
        <div id="word-bank-list"></div>
    </div>

    <div class="paper" id="mainPaper">
        <div class="paper-header">
            <h1 style="margin:0; font-size: 1.8rem;">Silhuett-ord</h1>
            <div class="info-box">
                <strong>Oppgave:</strong><br>
                <span id="task-text">Velg modus og trykk generer.</span>
            </div>
        </div>
        <div id="inline-bank" class="hidden" style="margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; font-weight: bold; border: 2px solid #333; padding: 10px; font-size: 1.1rem;"></div>
        <div id="output" class="grid-container"></div>
    </div>

    <div class="paper hidden" id="fasitPaper">
        <h1>Fasit</h1>
        <div id="fasitOutput" class="grid-container"></div>
    </div>
</div>

<script>
let currentMode = 'bilder';
let currentActiveWords = []; 

const substantivDb = [
    {ord: "and", symbol: "🦆"}, {ord: "ape", symbol: "🐒"}, {ord: "bil", symbol: "🚗"},
    {ord: "båt", symbol: "⛵"}, {ord: "egg", symbol: "🥚"}, {ord: "fly", symbol: "✈️"},
    {ord: "fot", symbol: "🦶"}, {ord: "is", symbol: "🍦"}, {ord: "ku", symbol: "🐄"},
    {ord: "lys", symbol: "💡"}, {ord: "ost", symbol: "🧀"}, {ord: "sol", symbol: "☀️"},
    {ord: "tog", symbol: "🚆"}, {ord: "tre", symbol: "🌳"}, {ord: "bok", symbol: "📖"}, 
    {ord: "sko", symbol: "👟"}, {ord: "hus", symbol: "🏠"}, {ord: "rev", symbol: "🦊"}
];

function setMode(mode) {
    currentMode = mode;
    document.body.className = 'mode-' + mode;
    document.getElementById('mode-overlay').classList.add('hidden');
    document.getElementById('settings-bilder').classList.toggle('hidden', mode !== 'bilder');
    document.getElementById('settings-egne').classList.toggle('hidden', mode !== 'egne');
}

function toggleFasitCheckbox() {
    const cb = document.getElementById('fasit-checkbox');
    if (event.target !== cb) {
        cb.checked = !cb.checked;
        updateFasitVisibility();
    }
}

function updateFasitVisibility() {
    const cb = document.getElementById('fasit-checkbox');
    const fp = document.getElementById('fasitPaper');
    if (cb.checked) {
        fp.classList.remove('hidden');
    } else {
        fp.classList.add('hidden');
    }
}

function updateBankPlacementOnly() {
    if (currentActiveWords.length === 0 || currentMode === 'bilder') return;
    
    updateTaskText();
    const inlineBank = document.getElementById('inline-bank');
    const bankPaper = document.getElementById('bankPaper');
    const bankList = document.getElementById('word-bank-list');
    const placement = document.getElementById('word-placement').value;

    inlineBank.innerHTML = "";
    bankList.innerHTML = "";
    inlineBank.classList.add('hidden');
    bankPaper.classList.add('hidden');

    if (placement !== 'none') {
        const shuffled = [...currentActiveWords].sort(() => 0.5 - Math.random());
        if (placement === 'bank') {
            inlineBank.classList.remove('hidden');
            inlineBank.style.display = "flex";
            shuffled.forEach(item => {
                inlineBank.innerHTML += `<span style="border:1px solid #000; padding:2px 10px; margin:4px;">${item.ord}</span>`;
            });
        } else if (placement === 'page') {
            bankPaper.classList.remove('hidden');
            shuffled.forEach(item => {
                bankList.innerHTML += `<div class="bank-word">${item.ord}</div>`;
            });
        }
    }
}

function getBoxClass(c) {
    c = c.toLowerCase();
    const loft = "bdfhklt";
    const kjeller = "gjpqy";
    if (loft.includes(c)) return "stue-loft";
    if (kjeller.includes(c)) return "stue-kjeller";
    return "stue";
}

function updateTaskText() {
    const taskElement = document.getElementById('task-text');
    if (currentMode === 'bilder') {
        taskElement.innerText = "Skriv ordene det er bilde av inn i boksene.";
    } else {
        const placement = document.getElementById('word-placement').value;
        let text = "Skriv riktig ord inn i boksene.";
        if (placement === 'bank') text += " Bruk ordbanken øverst.";
        if (placement === 'page') text += " Bruk ordbanken på det andre arket.";
        taskElement.innerText = text;
    }
}

function createWordHtml(item, isFasit) {
    const word = item.ord;
    let imgHtml = "";
    if (currentMode === 'bilder') {
        const charCode = Array.from(item.symbol).map(c => c.codePointAt(0).toString(16)).filter(code => code !== "fe0f").join('-');
        const imgUrl = `https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/${charCode}.svg`;
        imgHtml = `<div class="image-box"><img src="${imgUrl}"></div>`;
    }
    const boxes = word.split('').map(c => {
        const cls = getBoxClass(c);
        return `<div class="box ${cls}"><span>${isFasit ? c : ''}</span></div>`;
    }).join('');
    return `<div class="word-unit">${imgHtml}<div class="shapes-wrapper"><div class="shapes">${boxes}</div></div></div>`;
}

function run() {
    updateTaskText();
    const output = document.getElementById('output');
    const fasit = document.getElementById('fasitOutput');
    output.innerHTML = ""; fasit.innerHTML = "";

    if (currentMode === 'bilder') {
        const countInput = Math.min(document.getElementById('count').value, 6);
        const lens = document.getElementById('chars').value.split(',').map(Number);
        let pool = substantivDb.filter(item => lens.includes(item.ord.length));
        pool.sort(() => 0.5 - Math.random());
        currentActiveWords = pool.slice(0, countInput);
    } else {
        // Hent ord fra tekstfelt
        let words = document.getElementById('custom-words').value.split(',')
                    .map(w => ({ ord: w.trim() }))
                    .filter(w => w.ord.length > 0)
                    .slice(0, 12);
        
        // NYHET: Stokker rekkefølgen på silhuettene hver gang man trykker generer
        words.sort(() => 0.5 - Math.random());
        currentActiveWords = words;
    }

    updateBankPlacementOnly();

    currentActiveWords.forEach(item => {
        output.innerHTML += createWordHtml(item, false);
        fasit.innerHTML += createWordHtml(item, true);
    });
}
</script>
</body>
</html>
